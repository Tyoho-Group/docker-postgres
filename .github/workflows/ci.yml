name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "secure/**"
      - "slim/**"
      - ".github/workflows/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          # Only block on errors; warnings are informational
          failure-threshold: error

  build:
    name: Build (${{ matrix.image.key }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        image:
          - key: slim
            context: ./slim
          - key: secure
            context: ./secure
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build ${{ matrix.image.key }} (no push)
        uses: docker/build-push-action@v7.0.0
        with:
          context: ${{ matrix.image.context }}
          push: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            PG_UUIDV7_TAG=v1.7.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
