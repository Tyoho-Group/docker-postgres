name: Publish Postgres Images

on:
  push:
    paths:
      - "secure/**"
      - "slim/**"
      - ".github/workflows/publish.yml"
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Also push latest tag"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    # First Monday of each month at 02:15 UTC.
    - cron: "15 2 1-7 * 1"

permissions:
  contents: read
  packages: write

env:
  # Force JavaScript-based actions to run on Node 24 to avoid Node 20 deprecation breakage.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOCKER_BUILD_RECORD_UPLOAD: "false"
  DOCKER_BUILD_SUMMARY: "false"

concurrency:
  group: postgres-image-publish
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - key: secure
            context: ./secure
            ghcr_image: ghcr.io/tyoho-group/postgres-uuidv7-secure
          - key: slim
            context: ./slim
            ghcr_image: ghcr.io/tyoho-group/postgres-uuidv7-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0


      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        env:
          GHCR_IMAGE: ${{ matrix.image.ghcr_image }}
        run: |
          set -euo pipefail
          timestamp="$(date -u +'%Y%m%d-%H%M')"
          short_sha="${GITHUB_SHA::7}"

          tags="${GHCR_IMAGE}:${timestamp}"
          tags="${tags},${GHCR_IMAGE}:sha-${short_sha}"

          # On a semver tag push (e.g. v1.0.0), also tag the image with that version
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            semver="${GITHUB_REF#refs/tags/}"
            tags="${tags},${GHCR_IMAGE}:${semver}"
          fi

          # Push :latest on schedule, tag push, or manual run with push_latest=true
          is_tag_push="false"
          [[ "${GITHUB_REF}" == refs/tags/v* ]] && is_tag_push="true"

          if [[ "${{ github.event_name }}" == "schedule" ]] || \
            [[ "${is_tag_push}" == "true" ]] || \
            [[ "${{ github.event.inputs.push_latest || 'true' }}" == "true" ]]; then
            tags="${tags},${GHCR_IMAGE}:latest"
          fi

          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Generate OCI labels
        id: labels
        uses: docker/metadata-action@v6.0.0
        with:
          images: |
            ${{ matrix.image.ghcr_image }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v7.0.0
        with:
          context: ${{ matrix.image.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.labels.outputs.labels }}
          build-args: |
            PG_UUIDV7_TAG=v1.7.0
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.image.key }}
          cache-to: type=gha,mode=min,scope=${{ matrix.image.key }}

      - name: Verify package linkage and visibility
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GHCR_IMAGE: ${{ matrix.image.ghcr_image }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          package_name="${GHCR_IMAGE##*/}"
          package_json="$(gh api "/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/${package_name}")"

          visibility="$(jq -r '.visibility' <<<"${package_json}")"
          linked_repo="$(jq -r '.repository.full_name // empty' <<<"${package_json}")"
          package_url="$(jq -r '.html_url' <<<"${package_json}")"

          if [[ "${linked_repo}" != "${EXPECTED_REPOSITORY}" ]]; then
            echo "::error::Package ${package_name} is linked to '${linked_repo}', expected '${EXPECTED_REPOSITORY}'."
            echo "::error::Open ${package_url} and reconnect the package to ${EXPECTED_REPOSITORY}."
            exit 1
          fi

          if [[ "${visibility}" != "public" ]]; then
            echo "::error::Package ${package_name} visibility is '${visibility}', not 'public'."
            echo "::error::Open ${package_url}/settings and change visibility to Public."
            exit 1
          fi
