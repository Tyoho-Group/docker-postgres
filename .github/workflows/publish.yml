name: Publish Postgres Images

on:
  push:
    branches: [main]
    paths:
      - "secure/**"
      - "slim/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Also push latest tag"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    # Every Monday 02:15 UTC
    - cron: "15 2 * * 1"

permissions:
  contents: read
  packages: write

concurrency:
  group: postgres-image-publish
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - key: secure
            context: ./secure
            dockerhub_image: lienchen10/tyoho-postgres-uuidv7-secure
            ghcr_image: ghcr.io/tyoho-group/postgres-uuidv7-secure
          - key: slim
            context: ./slim
            dockerhub_image: lienchen10/tyoho-postgres-uuidv7-slim
            ghcr_image: ghcr.io/tyoho-group/postgres-uuidv7-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        env:
          DOCKERHUB_IMAGE: ${{ matrix.image.dockerhub_image }}
          GHCR_IMAGE: ${{ matrix.image.ghcr_image }}
        run: |
          set -euo pipefail
          timestamp="$(date -u +'%Y%m%d-%H%M')"
          short_sha="${GITHUB_SHA::7}"

          tags="${DOCKERHUB_IMAGE}:${timestamp}"
          tags="${tags},${DOCKERHUB_IMAGE}:sha-${short_sha}"
          tags="${tags},${GHCR_IMAGE}:${timestamp}"
          tags="${tags},${GHCR_IMAGE}:sha-${short_sha}"

          if [[ "${{ github.event_name }}" == "schedule" ]] || \
             [[ "${{ github.event.inputs.push_latest || 'true' }}" == "true" ]]; then
            tags="${tags},${DOCKERHUB_IMAGE}:latest"
            tags="${tags},${GHCR_IMAGE}:latest"
          fi

          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Generate OCI labels
        id: labels
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ matrix.image.dockerhub_image }}
            ${{ matrix.image.ghcr_image }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.labels.outputs.labels }}
          build-args: |
            PG_UUIDV7_TAG=v1.7.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
